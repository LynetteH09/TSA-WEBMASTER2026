<body>

    <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Community Connect</div>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <h1>Submit a Community Resource</h1>
    <p>Help us expand our database of verified local services.</p>
  </section>

  <!-- FORM SECTION -->
  <section class="content">
    <div class="submit-card">

      <form id="resourceForm">

        <label>Organization Name</label>
        <input type="text" required>

        <label>Category</label>
        <input type="text" required>

        <label>Description</label>
        <textarea required></textarea>

        <label>Website / Contact Information</label>
        <input type="text">

        <button type="submit" class="toggle-btn">
          Submit Resource
        </button>

      </form>

      <p id="successMessage" class="hidden success-msg">
        Thank you! Your submission has been received.
      </p>

    </div>
  </section>

  <footer>
    &copy; 2026 Community Connect
  </footer>

  <script src="js/form.js"></script>
