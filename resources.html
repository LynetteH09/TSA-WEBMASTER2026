<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resource Directory | Community Connect</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

    <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Community Connect</div>

      <li><a href="index.html">Home</a></li>

      <li><a href="prog.html">Programs</a></li>

  <!-- HEADER -->
  <section class="page-header directory-header">
    <h1>Resource Directory</h1>
    <p>Search and filter Fort Worth, TX community resources and support services.</p>
  </section>

  <!-- FILTER BAR -->
  <section class="directory-controls">
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search by name, description, category, or services..." />
    </div>

    <div class="select-wrap">
      <select id="categorySelect">
        <option value="All">All Categories</option>
      </select>
    </div>
  </section>

  <!-- COUNT -->
  <section class="directory-meta">
    <p id="resultsCount">Showing 0 resources</p>
  </section>

  <!-- RESULTS -->
  <main class="directory-grid" id="resourceGrid"></main>
